<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles.css">

    <title>ServeIT</title>
</head>

<body class="section-sit-bg">
    <!-- =========================
       HEADER / NAVIGATION
       ========================= -->
    <header id="navigation-bar"></header>

    <main>
        <div class="container mt-5">
            <div class="content-card text-center">
                <div class="row">
                    <div class="col">
                        <img src="/Images/serveit.png" class="img-fluid rounded mb-3" alt="ServeIT logo"
                            style="max-width: 400px;">
                        <h2 class="sit-logo-header">ServeIT</h2>
                        <p class="sub-header">Community-focused technology initiative</p>
                        <p class="main-paragraph">
                            Serve IT applies technology skills in order to build the capacity of local nonprofits so
                            they may better serve their own missions.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- =========================
       FOOTER
       ========================= -->
    <footer id="footer-bar" class="bg-body-tertiary d-flex align-items-center justify-content-center"></footer>

    <!-- =========================
       JS
       ========================= -->

    <script>
        async function loadComponent(id, file) {
            const res = await fetch(file);
            const text = await res.text();
            document.getElementById(id).innerHTML = text;
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadComponent("navigation-bar", "/Components/navigation-bar.html");
            loadComponent("footer-bar", "/Components/footer-bar.html");
        });
    </script>
</body>
