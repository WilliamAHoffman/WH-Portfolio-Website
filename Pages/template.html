<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles.css">

    <title>Templated</title>
</head>

<body class = "section-bg">
    <!-- =========================
       HEADER / NAVIGATION
       ========================= -->
    <header id="navigation-bar"></header>

    <main>

    </main>

    <!-- =========================
       FOOTER
       ========================= -->
    <footer id="footer-bar" class="bg-body-tertiary py-6 d-flex align-items-center justify-content-center"></footer>

    <!-- =========================
       JS
       ========================= -->

    <script>
        async function loadComponent(id, file) {
            const res = await fetch(file);
            const text = await res.text();
            document.getElementById(id).innerHTML = text;
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadComponent("navigation-bar", "/Components/navigation-bar.html");
            loadComponent("footer-bar", "/Components/footer-bar.html");
        });
    </script>
</body>
